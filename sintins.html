<aside class="config-sidebar">
    <div class="breadcrumbs">Home / Gear / SinTins</div>
    <h1 class="config-title">Modular SinTin</h1>
    
    <div class="accordion-container">
        
        <div class="accordion-item active">
            <button class="accordion-header" onclick="toggleMenu(this)">
                <span>1. Case Components</span>
                <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </button>
            <div class="accordion-panel" style="display: block;">
                <div class="option-group">
                    <span class="option-label">Top Color</span>
                    <div class="swatch-row">
                        <button class="swatch" style="background:#F5F1E7" onclick="changeColor('Mat_Top', '#F5F1E7')"></button>
                        <button class="swatch" style="background:#333333" onclick="changeColor('Mat_Top', '#333333')"></button>
                        <button class="swatch" style="background:#5A6B5D" onclick="changeColor('Mat_Top', '#5A6B5D')"></button>
                    </div>
                </div>
                <div class="option-group">
                    <span class="option-label">Base Color</span>
                    <div class="swatch-row">
                        <button class="swatch" style="background:#F5F1E7" onclick="changeColor('Mat_Base', '#F5F1E7')"></button>
                        <button class="swatch" style="background:#333333" onclick="changeColor('Mat_Base', '#333333')"></button>
                        <button class="swatch" style="background:#5A6B5D" onclick="changeColor('Mat_Base', '#5A6B5D')"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item active">
            <button class="accordion-header" onclick="toggleMenu(this)">
                <span>2. Choose Your Design</span>
                <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </button>
            <div class="accordion-panel" style="display: block;">
                
                <div class="option-group">
                    <span class="option-label">Select Artwork</span>
                    <select id="design-selector" class="design-dropdown" onchange="selectDesign(this.value)">
                        <option value="Blank_Bar">Blank Bar</option>
                        <option value="Koi">Koi</option>
                        <option value="LighthouseSun">Lighthouse Sun</option>
                        <option value="Wave">The Wave</option>
                        <option value="BonsaiSun">Bonsai Sun</option>
                        <option value="Ginkgo">Ginkgo Leaf</option>
                        <option value="MonsteraSun">Monstera Sun</option>
                    </select>
                </div>

                <hr class="divider">

                <div class="option-group">
                    <span class="option-label">Design: Main Color</span>
                    <div class="swatch-row">
                        <button class="swatch" style="background:#C0392B" onclick="changeColor('Mat_DesignMain', '#C0392B')"></button>
                        <button class="swatch" style="background:#2980B9" onclick="changeColor('Mat_DesignMain', '#2980B9')"></button>
                        <button class="swatch" style="background:#F39C12" onclick="changeColor('Mat_DesignMain', '#F39C12')"></button>
                    </div>
                </div>

                <div class="option-group">
                    <span class="option-label">Design: Accent Color</span>
                    <div class="swatch-row">
                        <button class="swatch" style="background:#FFFFFF" onclick="changeColor('Mat_DesignSub', '#FFFFFF')"></button>
                        <button class="swatch" style="background:#333333" onclick="changeColor('Mat_DesignSub', '#333333')"></button>
                    </div>
                </div>

            </div>
        </div>

    </div>
</aside>
