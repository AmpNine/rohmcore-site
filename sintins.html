<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SinTins | RohmCore Configurator</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        /* =========================================
           GLOBAL SETTINGS & TYPOGRAPHY
           ========================================= */
        :root {
            --navy: #112A46;
            --border: #eee;
            --text-main: #333;
            /* Base 18px for human readability (1rem = 18px) */
            font-size: 18px; 
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            overflow-x: hidden; 
            background: #fff;
        }

        /* =========================================
           DESKTOP LAYOUT
           ========================================= */
        .configurator-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        .config-sidebar { 
            width: 30vw; 
            padding: 2rem; 
            border-right: 1px solid var(--border); 
            overflow-y: auto; 
            background: #fafafa;
        }

        .config-viewer-area { 
            width: 70vw; 
            height: 100vh; 
            position: relative; 
            background: #f9f9f9;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth shrink for mobile */
        }

        model-viewer { width: 100%; height: 100%; }

        /* Typography */
        .breadcrumbs { font-size: 0.7rem; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .config-title { font-size: 1.8rem; margin-bottom: 2rem; color: var(--navy); font-weight: bold; }

        /* Accordion Styles */
        .accordion-item { border-bottom: 1px solid var(--border); }
        .accordion-header { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; background: none; border: none; padding: 1rem 0; 
            cursor: pointer; font-size: 1rem; font-weight: bold; color: var(--text-main);
        }
        .chevron { width: 1.2rem; transition: transform 0.3s; fill: #666; }
        .accordion-item.active .chevron { transform: rotate(180deg); }
        .accordion-panel { display: none; padding: 0.5rem 0 1.5rem 0; }
        .accordion-item.active .accordion-panel { display: block; }

        /* UI Elements */
        .option-group { margin-bottom: 1.5rem; }
        .option-label { font-size: 0.75rem; text-transform: uppercase; color: #666; margin-bottom: 0.5rem; display: block; }
        .swatch-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .swatch { 
            width: 2.2rem; height: 2.2rem; border-radius: 50%; 
            border: 1px solid #ccc; cursor: pointer; transition: transform 0.2s; 
        }
        .swatch:hover { transform: scale(1.1); border-color: var(--navy); }
        .design-dropdown { 
            width: 100%; padding: 0.8rem; font-size: 0.9rem; 
            border: 1px solid #333; border-radius: 4px; background: white; 
        }

        /* =========================================
           MOBILE VIEW (< 768px)
           ========================================= */
        @media (max-width: 768px) {
            .configurator-layout { flex-direction: column; }

            /* Default Viewer State */
            .config-viewer-area { width: 100vw; height: 85vh; }

            /* SHRINK STATE: Viewer gets smaller when a popup is open */
            .menu-is-open .config-viewer-area { height: 40vh; }

            /* Fixed Bottom Navigation */
            .config-sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100vw; height: 15vh; 
                padding: 0; border-top: 1px solid var(--border); 
                display: flex; align-items: center; background: white; z-index: 10;
            }

            .accordion-container { display: flex; width: 100%; justify-content: space-evenly; }
            .accordion-item { border: none; flex: 1; }
            .accordion-header { flex-direction: column; padding: 1rem 0; height: 100%; }
            .accordion-header span { font-size: 0.75rem; color: #888; }
            .accordion-item.active .accordion-header span { color: var(--navy); font-weight: bold; }
            .chevron { display: none; }
            .breadcrumbs, .config-title { display: none; }

            /* Mobile Popup Drawer */
            .accordion-panel { 
                display: block !important; visibility: hidden;
                position: fixed; bottom: 0; left: 0; width: 100vw; 
                max-height: 60vh; overflow-y: auto;
                background: white; border-radius: 1.5rem 1.5rem 0 0; 
                padding: 2rem 1.5rem; box-sizing: border-box;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 20;
                transform: translateY(100%); transition: transform 0.4s ease, visibility 0s 0.4s;
            }
            .accordion-item.active .accordion-panel { visibility: visible; transform: translateY(0); transition: transform 0.4s ease, visibility 0s; }

            /* Mobile Header inside Popup */
            .mobile-popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
            .mobile-popup-title { font-size: 1.1rem; font-weight: bold; color: var(--navy); }
            .mobile-close-btn { font-size: 1rem; background: none; border: none; color: #007AFF; font-weight: 600; cursor: pointer; }

            /* Larger swatches for touch */
            .swatch { width: 3.5rem; height: 3.5rem; }
        }
    </style>
</head>
<body>

    <main class="configurator-layout">
        <aside class="config-sidebar">
            <div class="breadcrumbs">Home / Gear / SinTins</div>
            <h1 class="config-title">Modular SinTin</h1>
            
            <div class="accordion-container">
                <div class="accordion-item active">
                    <button class="accordion-header" onclick="toggleMenu(this)">
                        <span>Case Elements</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </button>
                    <div class="accordion-panel">
                        <div class="mobile-popup-header">
                            <span class="mobile-popup-title">Case Colors</span>
                            <button class="mobile-close-btn" onclick="closeMobilePopup(this)">Done</button>
                        </div>
                        <div class="option-group">
                            <span class="option-label">Top Color</span>
                            <div class="swatch-row">
                                <button class="swatch" style="background:#D9CAAF" onclick="changeColor('Mat_Top', '#D9CAAF')"></button>
                                <button class="swatch" style="background:#302A5A" onclick="changeColor('Mat_Top', '#302A5A')"></button>
                                <button class="swatch" style="background:#FF972F" onclick="changeColor('Mat_Top', '#FF972F')"></button>
                            </div>
                        </div>
                        <div class="option-group">
                            <span class="option-label">Base Color</span>
                            <div class="swatch-row">
                                <button class="swatch" style="background:#D9CAAF" onclick="changeColor('Mat_Base', '#D9CAAF')"></button>
                                <button class="swatch" style="background:#302A5A" onclick="changeColor('Mat_Base', '#302A5A')"></button>
                                <button class="swatch" style="background:#FF972F" onclick="changeColor('Mat_Base', '#FF972F')"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <button class="accordion-header" onclick="toggleMenu(this)">
                        <span>Artwork</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </button>
                    <div class="accordion-panel">
                        <div class="mobile-popup-header">
                            <span class="mobile-popup-title">Artwork Selection</span>
                            <button class="mobile-close-btn" onclick="closeMobilePopup(this)">Done</button>
                        </div>
                        <select id="design-selector" class="design-dropdown" onchange="switchModel(this.value)">
                            <option value="assets/models/site-assets-koi.glb" selected>Koi</option>
                            <option value="assets/models/site-assets-blankbar.glb">Blank Bar</option>
                            <option value="assets/models/site-assets-wave.glb">The Wave</option>
                        </select>
                        <div class="option-group" style="margin-top: 1.5rem;">
                            <span class="option-label">Design Main</span>
                            <div class="swatch-row">
                                <button class="swatch" style="background:#D9CAAF" onclick="changeColor('Mat_DesignMain', '#D9CAAF')"></button>
                                <button class="swatch" style="background:#302A5A" onclick="changeColor('Mat_DesignMain', '#302A5A')"></button>
                                <button class="swatch" style="background:#FF972F" onclick="changeColor('Mat_DesignMain', '#FF972F')"></button>
                            </div>
                        </div>
                        <div class="option-group">
                            <span class="option-label">Design Accent</span>
                            <div class="swatch-row">
                                <button class="swatch" style="background:#D9CAAF" onclick="changeColor('Mat_DesignSub', '#D9CAAF')"></button>
                                <button class="swatch" style="background:#302A5A" onclick="changeColor('Mat_DesignSub', '#302A5A')"></button>
                                <button class="swatch" style="background:#FF972F" onclick="changeColor('Mat_DesignSub', '#FF972F')"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="config-viewer-area">
            <model-viewer 
                id="product-viewer" 
                src="assets/models/site-assets-koi.glb" 
                exposure="0.75" 
                shadow-intensity="1"
                camera-controls 
                touch-action="pan-y">
            </model-viewer>
        </section>
    </main>

    <script src="js/configurator.js"></script>
</body>
</html>
